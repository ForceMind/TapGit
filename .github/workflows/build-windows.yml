name: Build Windows Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build installer
        run: npm run pack:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tapgit-windows-package-${{ github.run_number }}
          path: |
            release/TapGit-*.exe
            release/TapGit-*.exe.blockmap
            release/builder-effective-config.yaml
          if-no-files-found: error
