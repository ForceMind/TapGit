name: Build Desktop Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build Windows installer
        run: npm run pack:win

      - name: Archive portable app
        run: Compress-Archive -Path release/win-unpacked/* -DestinationPath release/TapGit-win-unpacked.zip

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tapgit-windows-package-${{ github.run_number }}
          path: |
            release/TapGit-*.exe
            release/TapGit-*.exe.blockmap
            release/TapGit-win-unpacked.zip
            release/builder-effective-config.yaml
          if-no-files-found: error

  build-macos:
    runs-on: macos-14
    timeout-minutes: 60
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build macOS packages
        run: npm run pack:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tapgit-macos-package-${{ github.run_number }}
          path: |
            release/TapGit-*.dmg
            release/TapGit-*.zip
            release/builder-effective-config.yaml
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: tapgit-windows-package-${{ github.run_number }}
          path: release-artifacts/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: tapgit-macos-package-${{ github.run_number }}
          path: release-artifacts/macos

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/windows/TapGit-*.exe
            release-artifacts/windows/TapGit-*.exe.blockmap
            release-artifacts/windows/TapGit-win-unpacked.zip
            release-artifacts/macos/TapGit-*.dmg
            release-artifacts/macos/TapGit-*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
