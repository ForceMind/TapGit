name: Build Windows Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build installer
        run: npm run pack:win

      - name: Archive portable app
        run: Compress-Archive -Path release/win-unpacked/* -DestinationPath release/TapGit-win-unpacked.zip

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tapgit-windows-package-${{ github.run_number }}
          path: |
            release/TapGit-*.exe
            release/TapGit-*.exe.blockmap
            release/TapGit-win-unpacked.zip
            release/builder-effective-config.yaml
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - build-windows

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          name: tapgit-windows-package-${{ github.run_number }}
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/TapGit-*.exe
            release-artifacts/TapGit-*.exe.blockmap
            release-artifacts/TapGit-win-unpacked.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
